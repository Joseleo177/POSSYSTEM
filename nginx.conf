# Nginx Template para el POS System en Producción
server {
    listen 80;
    server_name mi-pos-dominio.com www.mi-pos-dominio.com;

    # Redireccionar HTTP a HTTPS si configuras SSL (recomendado)
    # return 301 https://$host$request_uri;

    # Frontend (React App - Sirviendo archivos estáticos)
    location / {
        root /var/www/pos-frontend/dist; # Ruta al build de Vite
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache control para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires max;
            log_not_found off;
        }
    }

    # Backend API (Node.js Proxy)
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Opcional: IP real del cliente para el audit log
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.env {
        deny all;
    }
}
