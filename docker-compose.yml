services:
  db:
    image: postgres:16-alpine
    container_name: pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-posdb}
      POSTGRES_USER:     ${POSTGRES_USER:-posuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pospassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-posuser} -d ${POSTGRES_DB:-posdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    environment:
      NODE_ENV:    ${NODE_ENV:-development}
      PORT:        4000
      # ── Modo LOCAL (PostgreSQL en Docker) ──────────────────────
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${POSTGRES_DB:-posdb}
      DB_USER:     ${POSTGRES_USER:-posuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pospassword}
      # ── Seguridad ──────────────────────────────────────────────
      JWT_SECRET:  ${JWT_SECRET:-supersecretkey_change_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL:   ${LOG_LEVEL:-info}
      # ── Modo NUBE — Supabase (dejar vacío para modo local) ─────
      # Si se proveen SUPABASE_URL y SUPABASE_SERVICE_KEY el
      # backend usará Supabase en lugar del contenedor db.
      SUPABASE_URL:         ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./backups:/app/backups

  backup:
    image: postgres:16-alpine
    container_name: pos_backup
    restart: unless-stopped
    environment:
      POSTGRES_DB:          ${POSTGRES_DB:-posdb}
      POSTGRES_USER:        ${POSTGRES_USER:-posuser}
      PGPASSWORD:           ${POSTGRES_PASSWORD:-pospassword}
      BACKUP_KEEP_DAYS:     ${BACKUP_KEEP_DAYS:-7}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    volumes:
      - ./backups:/backups
      - ./backup-entrypoint.sh:/backup-entrypoint.sh:ro
    entrypoint: ["sh", "/backup-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
